global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "service", "env"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: "default"

  routes:
    - match:
        severity: critical
      receiver: "critical"
      continue: false

    - match:
        severity: warning
      receiver: "default"

receivers:
  - name: "default"
    # En prod : remplacer par Slack, PagerDuty, email...
    # Ici : webhook vers un service de test (optionnel)

  - name: "critical"
    # Exemple de configuration email (désactivée par défaut)
    # email_configs:
    #   - to: "ops-team@example.com"
    #     from: "alertmanager@example.com"
    #     smarthost: "smtp.example.com:587"
    #     auth_username: "alertmanager@example.com"
    #     auth_password: "secret"

inhibit_rules:
  # Si une target est DOWN, inhiber les alertes métier liées
  - source_match:
      alertname: PrometheusTargetDown
    target_match:
      service: demo-api
    equal: ["env"]
