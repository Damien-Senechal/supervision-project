global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: "production"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "rules/*.yml"

scrape_configs:

  # Prometheus se scrape lui-même
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # API FastAPI applicative
  - job_name: "demo-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  # Métriques système (node_exporter)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 15s

  # Alertmanager
  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]
